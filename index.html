<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revio — Maintenance</title>

<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;700&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#0A0A0F;
  --t1:#F0EEF8;
  --t3:#4A4860;
}

/* FULL SCREEN FIX */
html,body{
  height:100%;
}

body{
  height:100dvh; /* 🔥 prend tout l'écran mobile */
  display:flex;
  flex-direction:column;
  background:var(--bg);
  font-family:'Geist',sans-serif;
  color:var(--t1);
}

/* TOP LOGO */
.top{
  display:flex;
  justify-content:center;
  padding-top:40px;
}

/* LOGO */
.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo-mark{
  width:42px;height:42px;
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#7B6FFF,#C8B8FF,#60D8C0);
  box-shadow:0 0 20px rgba(123,111,255,.4);
}

.logo-name{
  font-family:'Fraunces',serif;
  font-size:1.6rem;
  font-weight:700;
  background:linear-gradient(135deg,#A090FF,#C8B8FF,#60D8C0);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* CENTRE */
.center{
  flex:1; /* 🔥 prend tout l'espace restant */
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

/* TEXTE */
.center h1{
  font-family:'Fraunces',serif;
  font-size:2.2rem;
  margin-bottom:1rem;
}

.center p{
  font-size:15px;
  color:var(--t3);
  line-height:1.7;
  max-width:420px;
}

/* SIGNATURE */
.signature{
  margin-top:20px;
  font-size:18px;
  font-weight:600;
  background:linear-gradient(135deg,#7B6FFF,#C8B8FF,#60D8C0);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
</style>
</head>

<body>

<!-- LOGO -->
<div class="top">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none">
        <rect x="4" y="3" width="3" height="18" rx="1.5" fill="white"/>
        <path d="M7 3h6a5 5 0 0 1 0 10H7" stroke="white" stroke-width="3" stroke-linecap="round"/>
        <path d="M12 13l5 8" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </div>
    <span class="logo-name">Revio</span>
  </div>
</div>

<!-- CONTENU CENTRÉ -->
<div class="center">
  <h1>Maintenance en cours 🚧</h1>
  <p>
    Je suis en train d’améliorer l’application pour vous proposer une meilleure expérience.<br><br>
    Revio sera de nouveau disponible ce soir.
  </p>

  <div class="signature">
    Priou.R
  </div>
</div>

</body>
</html>
