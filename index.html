<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revio</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080808;--surface:#111111;--surface2:#181818;
  --border:#242424;--border2:#303030;
  --text:#F2F0EA;--text2:#888880;--text3:#444440;
  --accent:#E8F542;--accent2:#C8D832;--danger:#FF4444;--radius:12px;
}
html{scroll-behavior:smooth}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:0.6;}

/* APP */
#app{display:flex;flex-direction:column;min-height:100vh;position:relative;z-index:1;}

/* HEADER */
.app-header{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 2rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(8,8,8,0.92);backdrop-filter:blur(12px);z-index:10;}
.header-logo{display:flex;align-items:center;gap:10px;}
.logo-mark{width:32px;height:32px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo-mark svg{width:17px;height:17px;}
.logo-name{font-size:1.2rem;font-weight:800;letter-spacing:-0.03em;}
.header-tag{font-size:11px;font-family:'DM Mono',monospace;color:var(--text3);border:1px solid var(--border);border-radius:6px;padding:3px 10px;}

/* MAIN GRID */
.app-main{flex:1;display:grid;grid-template-columns:360px 1fr;min-height:calc(100vh - 65px);}

/* LEFT PANEL */
.left-panel{border-right:1px solid var(--border);padding:1.75rem;display:flex;flex-direction:column;gap:1.5rem;overflow-y:auto;}
.section-title{font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;}

/* MODE BUTTONS */
.mode-grid{display:flex;flex-direction:column;gap:8px;}
.mode-btn{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;cursor:pointer;transition:border-color 0.15s,background 0.15s;display:flex;align-items:center;gap:14px;text-align:left;width:100%;}
.mode-btn:hover{border-color:var(--border2);background:var(--surface2);}
.mode-btn.active{border-color:var(--accent);background:rgba(232,245,66,0.05);}
.mode-icon{width:36px;height:36px;border-radius:8px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;transition:background 0.15s;}
.mode-btn.active .mode-icon{background:rgba(232,245,66,0.15);}
.mode-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px;}
.mode-desc{font-size:11px;color:var(--text2);}

/* INPUTS */
.input-zone{display:none;}
.input-zone.active{display:block;}
.field-label{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text2);margin-bottom:8px;display:block;}
.input{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius);padding:12px 16px;font-family:'Syne',sans-serif;font-size:13px;color:var(--text);outline:none;transition:border-color 0.15s;}
.input:focus{border-color:var(--accent);}
.input::placeholder{color:var(--text3);}
textarea.input{resize:vertical;min-height:120px;line-height:1.6;}

/* SCANNER */
.scanner-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.scanner-btn{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;text-align:center;transition:border-color 0.15s,background 0.15s;position:relative;overflow:hidden;}
.scanner-btn:hover{border-color:var(--border2);background:var(--surface2);}
.scanner-btn input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:0;}
.scanner-btn-icon{font-size:1.4rem;display:block;margin-bottom:6px;}
.scanner-btn-label{font-size:12px;font-weight:600;color:var(--text);display:block;}
.scanner-btn-sub{font-size:10px;color:var(--text2);}
.preview-box{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;display:none;position:relative;}
.preview-box img{width:100%;display:block;max-height:200px;object-fit:cover;}
.preview-remove{position:absolute;top:8px;right:8px;background:rgba(8,8,8,0.8);border:none;color:var(--text2);border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer;}
.preview-remove:hover{color:var(--danger);}
.ocr-status{font-size:11px;color:var(--accent);font-family:'DM Mono',monospace;margin-top:8px;display:none;}

/* LENGTH */
.length-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.length-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 8px;cursor:pointer;text-align:center;transition:border-color 0.15s,background 0.15s;}
.length-btn:hover{border-color:var(--border2);}
.length-btn.active{border-color:var(--accent);background:rgba(232,245,66,0.05);}
.length-label{font-size:12px;font-weight:600;color:var(--text);display:block;margin-bottom:3px;}
.length-sub{font-size:10px;color:var(--text2);}

/* ERROR */
.err{background:rgba(255,68,68,0.08);border:1px solid rgba(255,68,68,0.3);border-radius:10px;padding:10px 14px;font-size:12px;color:#FF8888;display:none;line-height:1.5;}
.err.visible{display:block;}

/* GENERATE BTN */
.btn-generate{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--accent);color:#080808;border:none;border-radius:var(--radius);padding:14px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:-0.01em;transition:background 0.15s,transform 0.1s;}
.btn-generate:hover{background:var(--accent2);}
.btn-generate:active{transform:scale(0.99);}
.btn-generate:disabled{background:var(--surface2);color:var(--text3);cursor:not-allowed;}
.btn-generate .spinner{width:16px;height:16px;border:2px solid rgba(0,0,0,0.2);border-top-color:#080808;border-radius:50%;animation:spin 0.7s linear infinite;display:none;}
.btn-generate.loading .btn-text{display:none;}
.btn-generate.loading .spinner{display:block;}

/* RIGHT PANEL */
.right-panel{padding:1.75rem;overflow-y:auto;}
.right-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;}
.fiches-count{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;}
.btn-clear{background:none;border:1px solid var(--border);border-radius:8px;padding:5px 12px;color:var(--text3);font-family:'Syne',sans-serif;font-size:11px;cursor:pointer;transition:border-color 0.15s,color 0.15s;}
.btn-clear:hover{border-color:var(--danger);color:var(--danger);}

/* EMPTY STATE */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:5rem 2rem;text-align:center;color:var(--text3);gap:12px;}
.empty-glyph{font-size:2.5rem;opacity:0.3;}
.empty-text{font-size:13px;line-height:1.6;}

/* FICHE */
.fiche{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;animation:fadeUp 0.3s ease both;transition:border-color 0.15s;margin-bottom:1rem;}
.fiche:hover{border-color:var(--border2);}
.fiche-head{padding:1.25rem 1.5rem 1rem;display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;border-bottom:1px solid var(--border);}
.fiche-meta{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);margin-bottom:5px;display:flex;align-items:center;gap:8px;}
.fiche-tag{background:rgba(232,245,66,0.1);color:var(--accent);padding:1px 7px;border-radius:4px;font-size:10px;font-family:'DM Mono',monospace;}
.fiche-titre{font-size:1.1rem;font-weight:700;letter-spacing:-0.02em;line-height:1.3;}
.fiche-del{background:none;border:none;color:var(--text3);cursor:pointer;padding:4px;font-size:14px;line-height:1;border-radius:6px;transition:color 0.15s,background 0.15s;flex-shrink:0;}
.fiche-del:hover{color:var(--danger);background:rgba(255,68,68,0.1);}
.fiche-body{padding:1.25rem 1.5rem;}
.fiche-section{margin-bottom:1.1rem;}
.fiche-section:last-child{margin-bottom:0;}
.fiche-section-label{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
.fiche-resume{font-size:13px;color:var(--text2);line-height:1.75;}
.fiche-points{list-style:none;display:flex;flex-direction:column;gap:6px;}
.fiche-points li{font-size:13px;color:var(--text);line-height:1.6;padding-left:18px;position:relative;}
.fiche-points li::before{content:'→';position:absolute;left:0;color:var(--accent);font-size:11px;}
.fiche-exemple{background:var(--surface2);border-left:2px solid var(--accent);border-radius:0 8px 8px 0;padding:10px 14px;font-size:12px;color:var(--text2);line-height:1.7;font-family:'DM Mono',monospace;}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

@media(max-width:720px){
  .app-main{grid-template-columns:1fr;}
  .left-panel{border-right:none;border-bottom:1px solid var(--border);}
}
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header class="app-header">
    <div class="header-logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none"><path d="M4 6h16M4 12h10M4 18h13" stroke="#080808" stroke-width="2.5" stroke-linecap="round"/><circle cx="19" cy="18" r="3" fill="#080808"/></svg>
      </div>
      <span class="logo-name">Revio</span>
    </div>
    <span class="header-tag">Fiches IA</span>
  </header>

  <main class="app-main">

    <!-- ── LEFT PANEL ── -->
    <div class="left-panel">

      <!-- Mode -->
      <div>
        <p class="section-title">Mode d'entrée</p>
        <div class="mode-grid">
          <button class="mode-btn active" onclick="setMode('import')" id="mode-import">
            <div class="mode-icon">📄</div>
            <div>
              <p class="mode-name">Importer un cours</p>
              <p class="mode-desc">Collez votre texte</p>
            </div>
          </button>
          <button class="mode-btn" onclick="setMode('scan')" id="mode-scan">
            <div class="mode-icon">📷</div>
            <div>
              <p class="mode-name">Scanner le cours</p>
              <p class="mode-desc">Photo de votre cahier</p>
            </div>
          </button>
          <button class="mode-btn" onclick="setMode('ia')" id="mode-ia">
            <div class="mode-icon">✦</div>
            <div>
              <p class="mode-name">Demander à l'IA</p>
              <p class="mode-desc">Décrivez le sujet</p>
            </div>
          </button>
        </div>
      </div>

      <!-- Zone import -->
      <div id="zone-import" class="input-zone active">
        <label class="field-label">Votre cours</label>
        <textarea class="input" id="input-import" placeholder="Collez ici le texte de votre cours…"></textarea>
      </div>

      <!-- Zone scan -->
      <div id="zone-scan" class="input-zone">
        <label class="field-label">Photo de votre cahier</label>
        <div class="scanner-btns">
          <div class="scanner-btn">
            <input type="file" accept="image/*" capture="environment" onchange="handleScan(this)">
            <span class="scanner-btn-icon">📷</span>
            <span class="scanner-btn-label">Appareil photo</span>
            <span class="scanner-btn-sub">Prendre une photo</span>
          </div>
          <div class="scanner-btn">
            <input type="file" accept="image/*" onchange="handleScan(this)">
            <span class="scanner-btn-icon">🖼️</span>
            <span class="scanner-btn-label">Galerie</span>
            <span class="scanner-btn-sub">Choisir une image</span>
          </div>
        </div>
        <div class="preview-box" id="preview-box">
          <img id="preview-img" src="" alt="aperçu">
          <button class="preview-remove" onclick="clearScan()">✕ Supprimer</button>
        </div>
        <p class="ocr-status" id="ocr-status">✦ Image prête — l'IA lira votre écriture</p>
      </div>

      <!-- Zone IA -->
      <div id="zone-ia" class="input-zone">
        <label class="field-label">Sujet ou concept</label>
        <textarea class="input" id="input-ia" placeholder="Ex : La photosynthèse&#10;Ex : La Révolution française&#10;Ex : Les pointeurs en C"></textarea>
      </div>

      <!-- Longueur -->
      <div>
        <p class="section-title">Longueur de la fiche</p>
        <div class="length-grid">
          <button class="length-btn" onclick="setLength('courte')" id="len-courte">
            <span class="length-label">Courte</span>
            <span class="length-sub">3 points</span>
          </button>
          <button class="length-btn active" onclick="setLength('moyenne')" id="len-moyenne">
            <span class="length-label">Moyenne</span>
            <span class="length-sub">5 points</span>
          </button>
          <button class="length-btn" onclick="setLength('longue')" id="len-longue">
            <span class="length-label">Longue</span>
            <span class="length-sub">8 points</span>
          </button>
        </div>
      </div>

      <div class="err" id="err-msg"></div>

      <button class="btn-generate" id="gen-btn" onclick="genererFiche()">
        <span class="btn-text">Générer la fiche</span>
        <div class="spinner"></div>
      </button>

    </div>

    <!-- ── RIGHT PANEL ── -->
    <div class="right-panel">
      <div class="right-header">
        <span class="fiches-count" id="fiches-count">0 fiche</span>
        <button class="btn-clear" onclick="toutEffacer()">Tout effacer</button>
      </div>
      <div id="fiches-grid">
        <div class="empty-state" id="empty-state">
          <div class="empty-glyph">✦</div>
          <p class="empty-text">Vos fiches apparaîtront ici.<br>Choisissez un mode et générez votre première fiche.</p>
        </div>
      </div>
    </div>

  </main>
</div>

<script>
const GROQ_KEY = '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';
const GROQ_URL = 'https://api.groq.com/openai/v1/chat/completions';

let mode = 'import';
let length = 'moyenne';
let fiches = JSON.parse(localStorage.getItem('revio_fiches') || '[]');
let scanBase64 = null;

renderFiches();

function setMode(m) {
  mode = m;
  ['import','scan','ia'].forEach(id => {
    document.getElementById('mode-' + id).classList.toggle('active', id === m);
    document.getElementById('zone-' + id).classList.toggle('active', id === m);
  });
}

function setLength(l) {
  length = l;
  ['courte','moyenne','longue'].forEach(id => {
    document.getElementById('len-' + id).classList.toggle('active', id === l);
  });
}

function handleScan(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    scanBase64 = e.target.result;
    document.getElementById('preview-img').src = scanBase64;
    document.getElementById('preview-box').style.display = 'block';
    document.getElementById('ocr-status').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function clearScan() {
  scanBase64 = null;
  document.getElementById('preview-box').style.display = 'none';
  document.getElementById('ocr-status').style.display = 'none';
  document.getElementById('preview-img').src = '';
}

async function genererFiche() {
  const errEl = document.getElementById('err-msg');
  const btn = document.getElementById('gen-btn');
  errEl.classList.remove('visible');

  const nbPoints = { courte: '3', moyenne: '5', longue: '8' }[length];
  let messages = [];

  if (mode === 'import') {
    const texte = document.getElementById('input-import').value.trim();
    if (!texte) { showErr('Collez le texte de votre cours.'); return; }
    messages = [{ role: 'user', content: buildPrompt(`À partir de ce cours :\n\n${texte}`, nbPoints) }];

  } else if (mode === 'scan') {
    if (!scanBase64) { showErr('Prenez ou choisissez une photo de votre cours.'); return; }
    messages = [{
      role: 'user',
      content: [
        { type: 'image_url', image_url: { url: scanBase64 } },
        { type: 'text', text: buildPrompt("À partir du cours visible sur cette image (lis l'écriture manuscrite ou imprimée)", nbPoints) }
      ]
    }];

  } else {
    const sujet = document.getElementById('input-ia').value.trim();
    if (!sujet) { showErr('Décrivez le sujet à réviser.'); return; }
    messages = [{ role: 'user', content: buildPrompt(`Sur le sujet : "${sujet}"`, nbPoints) }];
  }

  btn.classList.add('loading');
  btn.disabled = true;

  try {
    const model = mode === 'scan' ? 'meta-llama/llama-4-scout-17b-16e-instruct' : 'llama-3.3-70b-versatile';

    const res = await fetch(GROQ_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_KEY}` },
      body: JSON.stringify({ model, messages, temperature: 0.7 })
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || `Erreur ${res.status}`);
    }

    const data = await res.json();
    let text = data.choices[0].message.content.trim().replace(/```json|```/g, '').trim();
    const fiche = JSON.parse(text);
    fiche.id = Date.now();
    fiche.date = new Date().toLocaleDateString('fr-FR');
    fiche.mode = mode;
    fiche.length = length;

    fiches.unshift(fiche);
    localStorage.setItem('revio_fiches', JSON.stringify(fiches));
    renderFiches();

    if (mode === 'import') document.getElementById('input-import').value = '';
    if (mode === 'ia') document.getElementById('input-ia').value = '';
    if (mode === 'scan') clearScan();

  } catch(e) {
    showErr('Erreur : ' + e.message);
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

function buildPrompt(context, nbPoints) {
  return `Tu es un professeur expert. ${context}. Génère une fiche de révision avec exactement ${nbPoints} points clés.

Réponds UNIQUEMENT en JSON valide, sans texte autour :
{
  "titre": "Titre clair",
  "resume": "Résumé en 2-3 phrases.",
  "points_cles": ["Point 1", "Point 2"...],
  "exemple": "Exemple concret ou application pratique."
}`;
}

function showErr(msg) {
  const el = document.getElementById('err-msg');
  el.textContent = msg;
  el.classList.add('visible');
}

function supprimerFiche(id) {
  fiches = fiches.filter(f => f.id !== id);
  localStorage.setItem('revio_fiches', JSON.stringify(fiches));
  renderFiches();
}

function toutEffacer() {
  if (!confirm('Supprimer toutes les fiches ?')) return;
  fiches = [];
  localStorage.setItem('revio_fiches', JSON.stringify(fiches));
  renderFiches();
}

function renderFiches() {
  const grid = document.getElementById('fiches-grid');
  const count = document.getElementById('fiches-count');
  count.textContent = fiches.length + ' fiche' + (fiches.length > 1 ? 's' : '');

  if (fiches.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-glyph">✦</div><p class="empty-text">Vos fiches apparaîtront ici.<br>Choisissez un mode et générez votre première fiche.</p></div>`;
    return;
  }

  const modeLabel = { import: 'Import', scan: 'Scan', ia: 'IA' };
  grid.innerHTML = fiches.map(f => `
    <div class="fiche">
      <div class="fiche-head">
        <div>
          <div class="fiche-meta">
            <span>${f.date}</span>
            <span class="fiche-tag">${modeLabel[f.mode] || 'IA'}</span>
            <span class="fiche-tag">${f.length || 'moyenne'}</span>
          </div>
          <p class="fiche-titre">${esc(f.titre)}</p>
        </div>
        <button class="fiche-del" onclick="supprimerFiche(${f.id})">✕</button>
      </div>
      <div class="fiche-body">
        <div class="fiche-section">
          <p class="fiche-section-label">Résumé</p>
          <p class="fiche-resume">${esc(f.resume)}</p>
        </div>
        <div class="fiche-section">
          <p class="fiche-section-label">Points clés</p>
          <ul class="fiche-points">${f.points_cles.map(p => `<li>${esc(p)}</li>`).join('')}</ul>
        </div>
        <div class="fiche-section">
          <p class="fiche-section-label">Exemple</p>
          <div class="fiche-exemple">${esc(f.exemple)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') genererFiche();
});
</script>
</body>
</html>
